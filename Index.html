<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بیتاکد</title>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6c5ce7;
            --secondary: #00b894;
            --accent: #0984e3;
            --bg: #f4f6fc;
            --card-bg: #ffffff;
            --text-dark: #1e1e2f;
            --text-light: #6b7280;
            --shadow: 0 20px 60px rgba(0, 0, 0, 0.07);
            --radius: 24px;
            --transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Vazirmatn', sans-serif;
            background: var(--bg);
            color: var(--text-dark);
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            width: 100%;
            height: 100vh;
            max-width: 1400px;
            margin: 0 auto;
            background: var(--card-bg);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            position: relative;
        }

        /* ===== هدر ===== */
        .navbar {
            display: none;
            align-items: center;
            justify-content: space-between;
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.04);
            position: sticky;
            top: 0;
            z-index: 30;
        }

        .navbar .logo {
            font-size: 22px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
        }

        /* ===== دکمه همبرگری (فقط خودش منو رو کنترل می‌کنه) ===== */
        .hamburger {
            display: flex;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            padding: 6px;
            border: none;
            background: transparent;
            z-index: 50;
            position: relative;
        }

        .hamburger span {
            display: block;
            width: 28px;
            height: 3px;
            background: var(--text-dark);
            border-radius: 4px;
            transition: var(--transition);
        }

        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 6px);
        }
        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }
        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(5px, -6px);
        }

        .nav-user {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-user .avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 15px;
        }

        .btn-logout {
            background: transparent;
            border: 1px solid #e5e7eb;
            padding: 6px 16px;
            border-radius: 40px;
            font-family: 'Vazirmatn', sans-serif;
            font-weight: 700;
            font-size: 13px;
            color: var(--text-light);
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-logout:hover {
            background: #fee2e2;
            border-color: #ef4444;
            color: #dc2626;
        }

        /* ===== منوی کناری ===== */
        .side-menu {
            position: fixed;
            top: 0;
            right: -320px;
            width: 300px;
            height: 100%;
            background: white;
            box-shadow: -10px 0 40px rgba(0, 0, 0, 0.08);
            padding: 30px 24px;
            transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 40;
            overflow-y: auto;
        }

        .side-menu.open {
            right: 0;
        }

        .side-menu .menu-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 16px;
            border-radius: 16px;
            cursor: pointer;
            transition: var(--transition);
            font-weight: 700;
            font-size: 16px;
            color: var(--text-dark);
            background: transparent;
            border: none;
            width: 100%;
            font-family: 'Vazirmatn', sans-serif;
        }

        .side-menu .menu-item:hover {
            background: #f0f2ff;
            color: var(--primary);
        }

        /* ===== اوورلی برای بستن منو با کلیک خارج ===== */
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: 35;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .menu-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* ===== صفحات ===== */
        .page {
            display: none;
            width: 100%;
            height: calc(100% - 65px);
            overflow-y: auto;
            padding: 24px 32px;
            background: var(--bg);
            position: absolute;
            top: 65px;
            left: 0;
        }

        .page.active {
            display: block;
        }

        /* ===== صفحه احراز هویت ===== */
        #page-auth {
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #f8faff, #eef2ff);
            height: 100%;
            top: 0;
            padding: 0;
        }

        #page-auth.active {
            display: flex;
        }

        .auth-box {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            padding: 48px 40px;
            border-radius: 48px;
            box-shadow: 0 30px 80px rgba(108, 92, 231, 0.12);
            width: 100%;
            max-width: 460px;
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .auth-box h2 {
            font-size: 30px;
            font-weight: 900;
            text-align: center;
        }

        .auth-box .sub {
            text-align: center;
            color: var(--text-light);
            margin-bottom: 28px;
        }

        .auth-tabs {
            display: flex;
            background: #f1f4fa;
            border-radius: 60px;
            padding: 4px;
            margin-bottom: 28px;
        }

        .auth-tabs button {
            flex: 1;
            border: none;
            background: transparent;
            padding: 12px 0;
            border-radius: 40px;
            font-family: 'Vazirmatn', sans-serif;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: var(--transition);
            color: var(--text-light);
        }

        .auth-tabs button.active-tab {
            background: white;
            color: var(--primary);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.04);
        }

        .auth-form {
            display: none;
            flex-direction: column;
            gap: 18px;
        }

        .auth-form.active-form {
            display: flex;
        }

        .auth-form input,
        .auth-form select {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e9ecf2;
            border-radius: 16px;
            font-family: 'Vazirmatn', sans-serif;
            font-size: 14px;
            transition: var(--transition);
            background: white;
            outline: none;
        }

        .auth-form input:focus,
        .auth-form select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(108, 92, 231, 0.08);
        }

        .auth-form .btn-submit {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border: none;
            color: white;
            padding: 16px;
            border-radius: 60px;
            font-weight: 900;
            font-size: 16px;
            cursor: pointer;
            transition: var(--transition);
            font-family: 'Vazirmatn', sans-serif;
        }

        .auth-form .btn-submit:hover {
            transform: scale(1.02);
            box-shadow: 0 12px 30px rgba(108, 92, 231, 0.3);
        }

        /* ===== سایر استایل‌ها ===== */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 24px;
        }

        .page-header h2 {
            font-size: 26px;
            font-weight: 900;
        }

        .freelancer-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        .freelancer-card {
            background: white;
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(0, 0, 0, 0.02);
            transition: var(--transition);
            cursor: pointer;
            text-align: center;
        }

        .freelancer-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 30px 60px rgba(108, 92, 231, 0.08);
            border-color: var(--primary);
        }

        .freelancer-card .avatar-lg {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 900;
            margin: 0 auto 12px;
        }

        .freelancer-card h3 {
            font-size: 18px;
            font-weight: 800;
        }

        .freelancer-card .title {
            color: var(--text-light);
            font-size: 14px;
            margin: 4px 0 10px;
        }

        .freelancer-card .badge-skills {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 10px 0 14px;
        }

        .freelancer-card .badge-skills span {
            background: #f0f2ff;
            color: var(--primary);
            font-size: 11px;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 40px;
        }

        .btn-view-profile {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 24px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: var(--transition);
            font-family: 'Vazirmatn', sans-serif;
        }

        .btn-view-profile:hover {
            background: #4a3db8;
            transform: scale(1.04);
        }

        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
        }

        .project-card {
            background: white;
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(0, 0, 0, 0.02);
            transition: var(--transition);
        }

        .project-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 30px 60px rgba(108, 92, 231, 0.08);
            border-color: var(--primary);
        }

        .project-card .tech-stack {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        .project-card .tech-stack span {
            background: #f0f2ff;
            color: var(--primary);
            font-size: 11px;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 40px;
        }

        .project-card h3 {
            font-size: 18px;
            font-weight: 800;
        }

        .project-card .desc {
            color: var(--text-light);
            font-size: 14px;
            line-height: 1.6;
            margin: 6px 0 14px;
        }

        .project-card .meta-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #f0f2f7;
            padding-top: 14px;
        }

        .project-card .price {
            font-weight: 900;
            font-size: 20px;
        }

        .project-card .price small {
            font-weight: 400;
            font-size: 13px;
            color: var(--text-light);
        }

        .project-card .freelancer {
            font-size: 13px;
            color: var(--text-light);
        }

        .project-card .freelancer strong {
            color: var(--primary);
        }

        .project-card .rating {
            color: #f59e0b;
            font-weight: 700;
        }

        .btn-buy-project {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: var(--transition);
            font-family: 'Vazirmatn', sans-serif;
        }

        .btn-buy-project:hover {
            background: #00a381;
            transform: scale(1.04);
        }

        .btn-buy-project.bought {
            background: #9ca3af;
            cursor: default;
        }

        .profile-container {
            background: white;
            border-radius: var(--radius);
            padding: 32px;
            box-shadow: var(--shadow);
            max-width: 900px;
            margin: 0 auto;
        }

        .profile-header {
            display: flex;
            gap: 30px;
            align-items: center;
            flex-wrap: wrap;
            border-bottom: 2px solid #f0f2f7;
            padding-bottom: 24px;
            margin-bottom: 24px;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: 900;
            flex-shrink: 0;
        }

        .profile-info h2 {
            font-size: 28px;
            font-weight: 900;
        }

        .profile-info .title {
            color: var(--text-light);
            font-size: 16px;
            margin: 4px 0 10px;
        }

        .profile-skills .skill-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .profile-skills .skill-tags span {
            background: #f0f2ff;
            color: var(--primary);
            padding: 6px 18px;
            border-radius: 40px;
            font-weight: 700;


            font-size: 14px;
        }

        .profile-projects .mini-project {
            background: #f8faff;
            border-radius: 16px;
            padding: 14px 18px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-right: 4px solid var(--primary);
        }

        .profile-projects .mini-project .p-price {
            font-weight: 900;
            color: var(--primary);
        }

        .back-btn {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
            padding: 10px 28px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: var(--transition);
            font-family: 'Vazirmatn', sans-serif;
            margin-bottom: 20px;
        }

        .back-btn:hover {
            background: var(--primary);
            color: white;
        }

        .cart-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .cart-item {
            background: white;
            border-radius: var(--radius);
            padding: 20px 24px;
            margin-bottom: 14px;
            box-shadow: var(--shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-right: 4px solid var(--primary);
        }

        .cart-item .info h4 {
            font-size: 17px;
            font-weight: 800;
        }

        .cart-item .info p {
            color: var(--text-light);
            font-size: 14px;
        }

        .cart-item .price {
            font-weight: 900;
            font-size: 18px;
        }

        .btn-remove-cart {
            background: #fee2e2;
            border: none;
            color: #dc2626;
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Vazirmatn', sans-serif;
        }

        .btn-remove-cart:hover {
            background: #dc2626;
            color: white;
        }

        .cart-total {
            background: white;
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 900;
            font-size: 22px;
            margin-top: 16px;
        }

        .btn-checkout {
            background: linear-gradient(135deg, var(--secondary), #00a381);
            color: white;
            border: none;
            padding: 14px 40px;
            border-radius: 60px;
            font-weight: 900;
            font-size: 16px;
            cursor: pointer;
            font-family: 'Vazirmatn', sans-serif;
        }

        .btn-checkout:hover {
            transform: scale(1.03);
            box-shadow: 0 8px 25px rgba(0, 184, 148, 0.3);
        }

        .empty-state {
            text-align: center;
            color: var(--text-light);
            padding: 40px 0;
            font-size: 16px;
        }

        @media (max-width: 900px) {
            .profile-header {
                flex-direction: column;
                text-align: center;
            }
            .page {
                padding: 16px;
            }
            .side-menu {
                width: 260px;
                right: -280px;
            }
        }

        @media (max-width: 600px) {
            .freelancer-grid,
            .project-grid {
                grid-template-columns: 1fr;
            }
            .auth-box {
                padding: 28px 20px;
            }
            .cart-item {
                flex-wrap: wrap;
                gap: 10px;
            }
        }
    </style>
</head>
<body>

    <div class="app-container">

        <!-- ===== هدر ===== -->
        <nav class="navbar" id="mainNavbar">
            <div style="display:flex; align-items:center; gap:12px;">
                <!-- فقط همین دکمه منو رو کنترل می‌کنه -->
                <button class="hamburger" id="hamburgerBtn" onclick="toggleMenu(event)">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
                <div class="logo" onclick="navigateTo('freelancers')">بیتاکد</div>
            </div>
            <div class="nav-user">
                <span style="font-size:13px; font-weight:700;" id="userNameDisplay">کاربر</span>
                <div class="avatar" id="userAvatar">ش</div>
                <button class="btn-logout" onclick="logout()">خروج</button>
            </div>
        </nav>

        <!-- ===== اوورلی برای بستن منو ===== -->
        <div class="menu-overlay" id="menuOverlay" onclick="closeMenu()"></div>

        <!-- ===== منوی کناری ===== -->
        <div class="side-menu" id="sideMenu">
            <div style="font-size:20px; font-weight:900; color:var(--primary); margin-bottom:30px; border-bottom:2px solid #f0f2f7; padding-bottom:16px;">📋 منوی اصلی</div>
            <button class="menu-item" onclick="navigateTo('freelancers')">
                <span style="font-size:22px;">👥</span> فریلنسرها
            </button>
            <button class="menu-item" onclick="navigateTo('projects')">
                <span style="font-size:22px;">📦</span> پروژه‌ها
            </button>
            <button class="menu-item" onclick="navigateTo('cart')">
                <span style="font-size:22px;">🛒</span> سبد خرید
                <span style="margin-right:auto; background:var(--primary); color:white; padding:2px 10px; border-radius:40px; font-size:12px;" id="cartBadgeMenu">0</span>
            </button>
            <hr style="margin:20px 0; border-color:#f0f2f7;">
            <button class="menu-item" onclick="logout()" style="color:#dc2626;">
                <span style="font-size:22px;">🚪</span> خروج
            </button>
        </div>

        <!-- ===== صفحه ۱: ورود ===== -->
        <div id="page-auth" class="page active">
            <div class="auth-box">
                <h2>به بیتاکد خوش اومدی</h2>
                <p class="sub">بزرگترین بازار فریلنسری ایران</p>
                <div class="auth-tabs">
                    <button class="active-tab" onclick="switchAuthTab('login')">ورود</button>
                    <button onclick="switchAuthTab('register')">ثبت‌نام</button>
                </div>
                <form class="auth-form active-form" id="loginForm" onsubmit="loginUser(event)">
                    <label>نام کاربری یا ایمیل</label>
                    <input type="text" placeholder="example@email.com" required>
                    <label>رمز عبور</label>
                    <input type="password" placeholder="••••••••" required>
                    <button type="submit" class="btn-submit">ورود</button>
                </form>
                <form class="auth-form" id="registerForm" onsubmit="registerUser(event)">
                    <label>نام و نام خانوادگی</label>
                    <input type="text" placeholder="علی رضایی" required>
                    <label>ایمیل</label>
                    <input type="email" placeholder="ali@email.com" required>
                    <label>رمز عبور</label>
                    <input type="password" placeholder="••••••••" required>
                    <label>نقش شما</label>
                    <select><option>توسعه‌دهنده</option><option>کارفرما</option><option>دانشجو</option></select>
                    <button type="submit" class="btn-submit">ثبت‌نام</button>
                </form>
            </div>
        </div>

        <!-- ===== صفحه ۲: فریلنسرها ===== -->
        <div id="page-freelancers" class="page">
            <div class="page-header">
                <h2>👥 فریلنسرهای بیتاکد</h2>
                <span style="color:var(--text-light);" id="freelancerCount">۶ نفر فعال</span>
            </div>
            <div class="freelancer-grid" id="freelancerGrid"></div>
        </div>

        <!-- ===== صفحه ۳: رزومه ===== -->
        <div id="page-profile" class="page">
            <button class="back-btn" onclick="navigateTo('freelancers')">← بازگشت</button>
            <div class="profile-container" id="profileContainer"></div>
        </div>

        <!-- ===== صفحه ۴: پروژه‌ها ===== -->
        <div id="page-projects" class="page">
            <div class="page-header">
                <h2>📦 همه پروژه‌ها</h2>
                <div style="display:flex; gap:10px; flex-wrap:wrap;">
                    <input type="text" placeholder="جستجو..." id="searchProject" onkeyup="renderProjects()" style="padding:10px 16px; border:2px solid #e9ecf2; border-radius:40px; font-family:'Vazirmatn',sans-serif; outline:none;">
                    <select id="categoryFilter" onchange="renderProjects()" style="padding:10px 16px; border:2px solid #e9ecf2; border-radius:40px; font-family:'Vazirmatn',sans-serif; outline:none; background:white;">
                        <option value="all">همه</option>
                        <option value="وب">وب</option>
                        <option value="موبایل">موبایل</option>
                        <option value="هوش مصنوعی">هوش مصنوعی</option>
                        <option value="اسکریپت">اسکریپت</option>
                    </select>
                </div>
            </div>
            <div class="project-grid" id="projectGrid"></div>
        </div>

        <!-- ===== صفحه ۵: سبد خرید ===== -->
        <div id="page-cart" class="page">
            <div class="page-header">
                <h2>🛒 سبد خرید</h2>
                <span style="color:var(--text-light);" id="cartCountLabel">۰ آیتم</span>
            </div>
            <div class="cart-container" id="cartContainer">
                <div class="empty-state">سبد خرید خالی است.</div>
            </div>
        </div>

    </div>

    <script>
        // =====================================================
        // داده‌ها
        // =====================================================
        const freelancersData = [{
            id: 1,
            name: 'بیتاحسنشاهی',
            avatar: 'ب',
            title: 'توسعه‌دهنده فول‌استک | ۷ سال تجربه',
            bio: 'بیتاحسنشاهی هستم، توسعه‌دهنده ارشد با تمرکز بر React و Node.js...',
            skills: ['React', 'Node.js', 'Python', 'MongoDB', 'Docker'],
            projects: [
                { title: 'پلتفرم فروشگاهی آنلاین', price: 3200000 },
                { title: 'سیستم مدیریت محتوا', price: 2800000 },
                { title: 'داشبورد تحلیل داده', price: 4100000 }
            ]
        }, {
            id: 2,
            name: 'پرنیا اسکندری',
            avatar: 'پ',
            title: 'مهندس نرم‌افزار | ۶ سال سابقه',
            bio: 'پرنیا اسکندری هستم، متخصص بک‌اند و پایگاه داده...',
            skills: ['Python', 'Django', 'PostgreSQL', 'Redis'],
            projects: [
                { title: 'سیستم مدیریت هتل پیشرفته', price: 4100000 },
                { title: 'پلتفرم آموزش آنلاین', price: 3700000 },
                { title: 'سیستم مدیریت پروژه تیمی', price: 2900000 }
            ]
        }, {
            id: 3,
            name: 'مبینا زارعی',
            avatar: 'م',
            title: 'توسعه‌دهنده موبایل | ۵ سال تجربه',
            bio: 'مبینا زارعی هستم، متخصص اپ‌های موبایل با Flutter...',
            skills: ['Flutter', 'Kotlin', 'Firebase', 'Swift'],
            projects: [
                { title: 'اپلیکیشن ورزشی و تناسب‌اندام', price: 2800000 },
                { title: 'اپ مدیریت مالی شخصی', price: 2200000 },
                { title: 'اپ خرید و فروش کالا', price: 3400000 }
            ]
        }, {
            id: 4,
            name: 'مهدیه طالبی',
            avatar: 'م',
            title: 'متخصص هوش مصنوعی | ۴ سال تجربه',
            bio: 'مهدیه طالبی هستم، پژوهشگر یادگیری عمیق...',
            skills: ['Python', 'TensorFlow', 'PyTorch', 'OpenCV'],
            projects: [
                { title: 'سیستم تشخیص چهره (AI)', price: 5500000 },
                { title: 'سیستم تشخیص پلاک خودرو', price: 4800000 },
                { title: 'ربات گفتگوی هوشمند', price: 3900000 }
            ]
        }, {
            id: 5,
            name: 'زهرا محمدی',
            avatar: 'ز',
            title: 'توسعه‌دهنده فرانت‌اند | ۵ سال تجربه',
            bio: 'زهرا محمدی هستم، متخصص UI/UX با React و Vue...',
            skills: ['React', 'Vue.js', 'Tailwind', 'Figma'],
            projects: [
                { title: 'قالب ادمین حرفه‌ای', price: 1200000 },
                { title: 'داشبورد مدیریت فروش', price: 1800000 },
                { title: 'صفحه فرود استارت‌آپ', price: 950000 }
            ]
        }, {
            id: 6,
            name: 'فاطمه گرایی',
            avatar: 'ف',
            title: 'توسعه‌دهنده بک‌اند | ۴ سال سابقه',
            bio: 'فاطمه گرایی هستم، متخصص Node.js و Express...',
            skills: ['Node.js', 'Express', 'MongoDB', 'Docker'],
            projects: [
                { title: 'API مدیریت کاربران', price: 1500000 },
                { title: 'سیستم پرداخت آنلاین', price: 2600000 },
                { title: 'وب‌سرویس تحلیل داده', price: 2200000 }
            ]
        }];

        let projectsData = [];
        freelancersData.forEach(fl => {
            fl.projects.forEach((p, idx) => {
                projectsData.push({
                    id: projectsData.length + 1,
                    title: p.title,
                    desc: `پروژه‌ای از ${fl.name} در حوزه ${fl.skills[0] || 'برنامه‌نویسی'}`,
                    price: p.price,
                    category: ['وب', 'موبایل', 'هوش مصنوعی', 'اسکریپت'][Math.floor(Math.random() * 4)],
                    tech: fl.skills.slice(0, 3),
                    rating: (4.5 + Math.random() * 0.5).toFixed(1),
                    freelancerId: fl.id,
                    freelancerName: fl.name
                });
            });
        });

        let currentUser = null;
        let selectedFreelancerId = null;
        let cart = [];

        // =====================================================
        // توابع ناوبری
        // =====================================================
        function navigateTo(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            const target = document.getElementById('page-' + page);
            if (target) target.classList.add('active');
            if (page === 'cart') updateCartUI();
            closeMenu(); // بستن منو بعد از کلیک روی آیتم
        }

        // =====================================================
        // توابع منوی همبرگری (فقط با کلیک روی دکمه)
        // =====================================================
        function toggleMenu(e) {
            e.stopPropagation();
            const menu = document.getElementById('sideMenu');
            const overlay = document.getElementById('menuOverlay');
            const hamburger = document.getElementById('hamburgerBtn');

            menu.classList.toggle('open');
            overlay.classList.toggle('active');
            hamburger.classList.toggle('active');
        }

        function closeMenu() {
            const menu = document.getElementById('sideMenu');
            const overlay = document.getElementById('menuOverlay');
            const hamburger = document.getElementById('hamburgerBtn');

            menu.classList.remove('open');
            overlay.classList.remove('active');
            hamburger.classList.remove('active');
        }

        // =====================================================
        // احراز هویت
        // =====================================================
        function switchAuthTab(tab) {
            document.querySelectorAll('.auth-tabs button').forEach(b => b.classList.remove('active-tab'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active-form'));
            if (tab === 'login') {
                document.querySelector('.auth-tabs button:first-child').classList.add('active-tab');
                document.getElementById('loginForm').classList.add('active-form');
            } else {
                document.querySelector('.auth-tabs button:last-child').classList.add('active-tab');
                document.getElementById('registerForm').classList.add('active-form');
            }
        }

        function loginUser(e) {
            e.preventDefault();
            const name = prompt('نام خود را وارد کنید:', 'کاربر مهمان');
            if (!name) return;

            currentUser = { name };
            document.getElementById('userNameDisplay').textContent = name;
            document.getElementById('userAvatar').textContent = name.charAt(0);
            document.getElementById('mainNavbar').style.display = 'flex';

            document.getElementById('page-auth').classList.remove('active');
            renderFreelancers();
            navigateTo('freelancers');
        }

        function registerUser(e) {
            e.preventDefault();
            const name = document.querySelector('#registerForm input[type="text"]').value.trim();
            if (!name) {
                alert('لطفاً نام خود را وارد کنید.');
                return;
            }

            currentUser = { name };
            document.getElementById('userNameDisplay').textContent = name;
            document.getElementById('userAvatar').textContent = name.charAt(0);
            document.getElementById('mainNavbar').style.display = 'flex';

            document.getElementById('page-auth').classList.remove('active');
            renderFreelancers();
            navigateTo('freelancers');
        }

        function logout() {
            if (!confirm('آیا از خروج مطمئن هستید؟')) return;
            currentUser = null;
            selectedFreelancerId = null;
            cart = [];
            document.getElementById('mainNavbar').style.display = 'none';
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-auth').classList.add('active');
            closeMenu();
            updateCartUI();
        }

        // =====================================================
        // رندر فریلنسرها
        // =====================================================
        function renderFreelancers() {
            const grid = document.getElementById('freelancerGrid');
            grid.innerHTML = '';
            freelancersData.forEach(fl => {
                const card = document.createElement('div');
                card.className = 'freelancer-card';
                card.innerHTML = `
                    <div class="avatar-lg">${fl.avatar}</div>
                    <h3>${fl.name}</h3>
                    <div class="title">${fl.title}</div>
                    <div class="badge-skills">${fl.skills.slice(0, 3).map(s => `<span>#${s}</span>`).join('')}</div>
                    <button class="btn-view-profile" onclick="event.stopPropagation(); viewFreelancer(${fl.id})">مشاهده رزومه</button>
                `;
                card.addEventListener('click', () => viewFreelancer(fl.id));
                grid.appendChild(card);
            });
            document.getElementById('freelancerCount').textContent = freelancersData.length + ' نفر فعال';
        }

        // =====================================================
        // رزومه
        // =====================================================
        function viewFreelancer(id) {
            selectedFreelancerId = id;
            const fl = freelancersData.find(f => f.id === id);
            if (!fl) return;

            const container = document.getElementById('profileContainer');
            container.innerHTML = `
                <div class="profile-header">
                    <div class="profile-avatar">${fl.avatar}</div>
                    <div class="profile-info">
                        <h2>${fl.name}</h2>
                        <div class="title">${fl.title}</div>
                        <div style="display:flex; gap:16px; flex-wrap:wrap; color:var(--text-light); font-size:14px;">
                            <span>⭐ <strong>۴.۸</strong> (۱۲۵ امتیاز)</span>
                            <span>📁 <strong>${fl.projects.length}</strong> پروژه</span>
                        </div>
                    </div>
                </div>
                <div style="margin-bottom:16px;">
                    <h4 style="font-size:18px;">📝 بیوگرافی</h4>
                    <p style="color:var(--text-light); line-height:1.8;">${fl.bio}</p>
                </div>
                <div class="profile-skills" style="margin-bottom:16px;">
                    <h4 style="font-size:18px;">🛠 مهارت‌ها</h4>
                    <div class="skill-tags">${fl.skills.map(s => `<span>${s}</span>`).join('')}</div>
                </div>
                <div class="profile-projects">
                    <h4 style="font-size:18px;">📦 پروژه‌ها</h4>
                    ${fl.projects.map(p => `
                        <div class="mini-project">
                            <span>${p.title}</span>
                            <span class="p-price">${p.price.toLocaleString()} تومان</span>
                        </div>
                    `).join('')}
                </div>
                <div style="margin-top:20px; display:flex; gap:14px; flex-wrap:wrap;">
                    <button class="btn-view-profile" onclick="navigateTo('projects')" style="background:var(--secondary);">📦 مشاهده پروژه‌ها</button>
                </div>
            `;
            navigateTo('profile');
        }

        // =====================================================
        // پروژه‌ها
        // =====================================================
        function renderProjects() {
            const search = document.getElementById('searchProject')?.value?.toLowerCase() || '';
            const cat = document.getElementById('categoryFilter')?.value || 'all';

            const filtered = projectsData.filter(p => {
                const matchSearch = p.title.includes(search) || p.desc.includes(search) || p.freelancerName.includes(
                search);
                const matchCat = cat === 'all' || p.category === cat;
                return matchSearch && matchCat;
            });

            const grid = document.getElementById('projectGrid');
            grid.innerHTML = '';
            if (filtered.length === 0) {
                grid.innerHTML =
                    `<p style="grid-column:1/-1; text-align:center; color:var(--text-light);">پروژه‌ای یافت نشد.</p>`;
                return;
            }

            filtered.forEach(p => {
                const inCart = cart.some(item => item.id === p.id);
                const card = document.createElement('div');
                card.className = 'project-card';
                card.innerHTML = `
                    <div class="tech-stack">${p.tech.map(t => `<span>#${t}</span>`).join('')}</div>
                    <h3>${p.title}</h3>
                    <div class="rating">⭐ ${p.rating}</div>
                    <p class="desc">${p.desc}</p>
                    <div class="meta-row">
                        <div>
                            <span class="price">${p.price.toLocaleString()} <small>تومان</small></span>
                            <div class="freelancer">توسط <strong>${p.freelancerName}</strong></div>
                        </div>
                        <button class="btn-buy-project ${inCart ? 'bought' : ''}" onclick="buyProject(${p.id})">
                            ${inCart ? '✅ خریداری شد' : '🛒 خرید'}
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // =====================================================
        // خرید
        // =====================================================
        function buyProject(id) {
            if (!currentUser) {
                alert('لطفاً ابتدا وارد شوید.');
                return;
            }
            if (cart.some(item => item.id === id)) {
                alert('این پروژه قبلاً به سبد خرید اضافه شده است.');
                return;
            }
            const project = projectsData.find(p => p.id === id);
            if (project) {
                cart.push({ ...project });
                alert(`✅ "${project.title}" به سبد خرید اضافه شد.`);
                renderProjects();
                updateCartUI();
            }
        }

        // =====================================================
        // سبد خرید
        // =====================================================
        function updateCartUI() {
            const container = document.getElementById('cartContainer');
            const countLabel = document.getElementById('cartCountLabel');
            const badgeMenu = document.getElementById('cartBadgeMenu');

            if (cart.length === 0) {
                container.innerHTML = `<div class="empty-state">🛍️ سبد خرید شما خالی است.</div>`;
                if (countLabel) countLabel.textContent = '۰ آیتم';
                if (badgeMenu) badgeMenu.textContent = '0';
                return;
            }

            let html = '';
            let total = 0;
            cart.forEach((item, index) => {
                total += item.price;
                html += `
                    <div class="cart-item">
                        <div class="info">
                            <h4>${item.title}</h4>
                            <p>توسط ${item.freelancerName}</p>
                        </div>
                        <div style="display:flex; align-items:center; gap:16px;">
                            <span class="price">${item.price.toLocaleString()} تومان</span>
                            <button class="btn-remove-cart" onclick="removeFromCart(${index})">حذف</button>
                        </div>
                    </div>
                `;
            });

            html += `
                <div class="cart-total">
                    <span>جمع کل:</span>
                    <span>${total.toLocaleString()} تومان</span>
                </div>
                <div style="margin-top:20px; display:flex; justify-content:flex-end;">
                    <button class="btn-checkout" onclick="checkout()">✅ نهایی‌سازی خرید</button>
                </div>
            `;

            container.innerHTML = html;
            if (countLabel) countLabel.textContent = cart.length + ' آیتم';
            if (badgeMenu) badgeMenu.textContent = cart.length;
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCartUI();
            renderProjects();
        }

        function checkout() {
            if (cart.length === 0) {
                alert('سبد خرید خالی است.');
                return;
            }
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            alert(`✅ خرید با موفقیت ثبت شد!\nمبلغ کل: ${total.toLocaleString()} تومان`);
            cart = [];
            updateCartUI();
            renderProjects();
            navigateTo('freelancers');
        }

        // =====================================================
        // شروع
        // =====================================================
        document.getElementById('page-auth').classList.add('active');
        document.getElementById('mainNavbar').style.display = 'none';

        renderFreelancers();
        renderProjects();
        updateCartUI();

        console.log('🚀 بیتاکد با منوی همبرگری درست بارگذاری شد!');
        console.log('✅ فقط با کلیک روی دکمه سه‌خط منو باز میشه.');
    </script>

</body>
</html>
